<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App v3 🚀</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      padding-top: 50px;
    }

    .container {
      width: 400px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px 15px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .add-btn {
      background: #ff6600;
      color: white;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #fafafa;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .completed {
      text-decoration: line-through;
      color: gray;
    }

    .actions button {
      margin-left: 5px;
    }

    .complete-btn {
      background: #007bff;
      color: white;
    }

    .delete-btn {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Todo App v2 🚀</h1>

  <div class="input-group">
    <input type="text" id="todoInput" placeholder="Enter task">
    <button class="add-btn" onclick="addTodo()">Add</button>
  </div>

  <ul id="todoList"></ul>
</div>

<script>

const API_URL = "http://localhost:8082/todos";

async function fetchTodos() {
  const response = await fetch(API_URL);
  const todos = await response.json();

  const list = document.getElementById("todoList");
  list.innerHTML = "";

  todos.forEach(todo => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="${todo.completed ? 'completed' : ''}">
        ${todo.title}
      </span>

      <div class="actions">
        <button class="complete-btn" onclick="toggleComplete(${todo.id}, ${todo.completed})">
          ${todo.completed ? 'Undo' : 'Complete'}
        </button>

        <button class="delete-btn" onclick="deleteTodo(${todo.id})">
          Delete
        </button>
      </div>
    `;

    list.appendChild(li);
  });
}

async function addTodo() {
  const input = document.getElementById("todoInput");

  if (!input.value.trim()) return;

  await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title: input.value
    })
  });

  input.value = "";
  fetchTodos();
}

async function deleteTodo(id) {
  await fetch(`${API_URL}/${id}`, {
    method: "DELETE"
  });

  fetchTodos();
}

async function toggleComplete(id, completed) {
  await fetch(`${API_URL}/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      completed: !completed
    })
  });

  fetchTodos();
}

fetchTodos();

</script>

</body>
</html>
